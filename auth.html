<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Game - Mortgage Backed Monopoly</title>
    <link rel="stylesheet" href="src/css/style.css?v=5">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mortgage Backed Monopoly</h1>
            <p><em>If they did it in 2008, it's fair game</em></p>
        </div>

        <div class="content auth-content">
            <div class="auth-container">

                <!-- Step 1: Email input -->
                <div id="step-email">
                    <h2>Create New Game</h2>
                    <p style="color: #7f8c8d; margin-bottom: 24px;">
                        Enter your email and we'll send you a 6-digit code. No password needed.
                    </p>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="email-input" placeholder="your@email.com" required>
                    </div>
                    <div id="email-error" class="error-message"></div>
                    <button id="send-code-btn" class="btn btn-primary" onclick="handleSendCode()">Send Code</button>
                    <p style="margin-top: 16px; text-align: center;">
                        <a href="index.html" style="color: #7f8c8d; font-size: 0.9em;">Back to home</a>
                    </p>
                </div>

                <!-- Step 2: Code verification -->
                <div id="step-code" style="display: none;">
                    <h2>Enter Your Code</h2>
                    <p style="color: #7f8c8d; margin-bottom: 24px;">
                        We sent a 6-digit code to <strong id="sent-to-email"></strong>.
                    </p>
                    <div class="form-group">
                        <label>Verification Code:</label>
                        <input type="text" id="code-input" placeholder="123456" maxlength="6"
                               inputmode="numeric" autocomplete="one-time-code" required>
                    </div>
                    <div id="code-error" class="error-message"></div>
                    <button id="verify-code-btn" class="btn btn-primary" onclick="handleVerifyCode()">Verify Code</button>
                    <p style="margin-top: 16px; text-align: center;">
                        <a href="#" onclick="resetToEmail()" style="color: #7f8c8d; font-size: 0.9em;">Back / use a different email</a>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="src/js/config.js?v=4"></script>
    <script src="src/js/supabase.js?v=4"></script>
    <script src="src/js/auth.js?v=4"></script>
</body>
</html>
