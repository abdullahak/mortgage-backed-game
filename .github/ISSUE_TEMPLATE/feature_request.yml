name: Feature request
description: Propose major roadmap work or a new player-facing capability.
title: "[Feature]: "
labels:
  - feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What larger product or player need does this feature address?
      placeholder: Describe the gap this feature closes.
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: How does the app handle this today?
      placeholder: Note any workarounds or missing flows.
    validations:
      required: true
  - type: textarea
    id: desired-behavior
    attributes:
      label: Desired behavior
      description: What should the finished experience support?
      placeholder: Describe the target player, host, or operator workflow.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What must be true before this is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: codex-notes
    attributes:
      label: Notes for Codex
      description: Implementation hints, sequencing notes, test expectations, or non-goals.
      placeholder: Mention likely files, routes, tests, edge cases, or dev ports.
    validations:
      required: false
